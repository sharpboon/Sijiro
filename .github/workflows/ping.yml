name: Streamlit Keep-Alive Ping

on:
  schedule:
    - cron: "*/50 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: curl -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/120.0.0.0" -s "https://sijiro-mhc8nhmtpkslflvqonvcmv.streamlit.app/" > /dev/null
