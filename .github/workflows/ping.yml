name: Streamlit Keep-Alive Ping

on:
  schedule:
    # 50분마다 자동으로 실행 (cron 식)
    - cron: "*/50 * * * *"
  # 수동으로 실행할 수 있는 버튼 추가
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: |
          curl -sL "https://sijiro-mhc8nhmtpkslflvqonvcmv.streamlit.app/" > /dev/null
          echo "Ping sent to Streamlit App!"
